version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        - env | grep -e NEXT_PUBLIC_ >> .env.production
        - env | grep -e PAYPAL_API_BASE >> .env.production
        - env | grep -e PAYPAL_CLIENT_SECRET >> .env.production
        - env | grep -e PAYPAL_CLIENT_ID >> .env.production      
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - .npm/**/*